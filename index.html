<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mint#4</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/fbgS5mrg/1780551867047.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/fbgS5mrg/1780551867047.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="ccs/00_variables.css">
    <link rel="stylesheet" href="css/01_frame.css">
</head>
<body data-theme="default">

  <div id="fs-overlay"></div>

  <!-- SVG Patterns definitions -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#aaaaaa" />
        <stop offset="100%" stop-color="#e0e0e0" />
      </linearGradient>
      <pattern id="polka" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
        <circle fill="url(#starGrad)" cx="2" cy="2" r="1.2"></circle>
      </pattern>
    </defs>
  </svg>


  <!-- 全局自定义壁纸层 (改为z-index:0以覆盖默认色彩而不破坏原本效果) -->
  <div id="global-wallpaper" style="position:fixed; inset:0; z-index:0; pointer-events:none; background-size:cover; background-position:center; display:none; transition:opacity 0.5s;"></div>

  <!-- 灵动岛 -->
  <div class="dynamic-island"></div>

  <div class="status-bar">
    <!-- 时间和5G状态栏内容已删除，保留区域占位 -->
  </div>

  <div class="theme-switcher" id="themeSwitcher">
    <div class="theme-close-btn" id="themeCloseBtn"><i class="fa-solid fa-xmark"></i></div>
    <div class="main-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20"/></svg></div>
    <div class="theme-list">
      <div class="theme-dot active" data-t="default"></div>
      <div class="theme-dot" data-t="rose"></div>
      <div class="theme-dot" data-t="sage"></div>
      <div class="theme-dot" data-t="blue"></div>
      <div class="theme-dot" data-t="bw"></div>
    </div>
  </div>

  <div class="pager" id="pager">
    <!-- 第一页 -->
    <div class="page">
      
      <!-- 顶部两个组件 (磨砂、无边框、方角、加大间距、时间缩短) -->
      <div class="top-widgets-area">
        <div class="widget-base time-widget">
          <div class="progress-circle">50</div>
          <div class="time-info"><span>Time</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="widget-time">09:41</span></div>
          <div class="bow-decoration"></div>
        </div>
        <div class="widget-base user-widget">
          <div class="avatar" data-img-id="main-avatar" onclick="openWidgetImgModal('main-avatar', this)" style="background-image: url('https://i.postimg.cc/tTQDHN30/image-download-1772630329906.jpg'); cursor: pointer;"></div>
          <div class="user-info">
            <div class="info-row-1">
              <div style="display:flex; align-items:center; gap:4px;"><svg style="width:12px; height:12px; color:#aaa;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span contenteditable="true" data-edit-id="user-sub">미녀 고교가 입학하다</span></div>
              <span style="color:#999; font-size:10px;">확인</span>
            </div>
            <div class="info-row-2" contenteditable="true" data-edit-id="user-name">Xiaoubabe</div>
            <div class="info-row-3">&gt; Today <span id="widget-date">11-13</span></div>
          </div>
        </div>
      </div>

      <!-- 主网格 (4列) 调整间距 -->
      <div class="content-grid">
        
        <!-- Row 1 & 2: 左侧宝丽来, 右侧4个App -->
        <div class="polaroid-wrapper">
          <!-- 撒在周围的星星 -->
          <svg class="p-star p-star-1" viewBox="0 0 24 24"><path fill="url(#polka)" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="p-star p-star-2" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="p-star p-star-3" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>

          <div class="polaroid-inner">
            <div class="photo-bg" data-img-id="polaroid-main" onclick="openWidgetImgModal('polaroid-main', this)" style="background-image: url('https://i.postimg.cc/tTQDHN30/image-download-1772630329906.jpg'); cursor: pointer;"></div>
            <div class="polaroid-text" contenteditable="true" data-edit-id="polaroid-txt">con doccura</div>
            <div class="polaroid-side">
              <div class="side-photo" data-img-id="polaroid-side-1" onclick="openWidgetImgModal('polaroid-side-1', this)" style="background-image: url('https://i.postimg.cc/XJSx0kwH/image-download-1772630325431.jpg'); cursor: pointer;"></div>
              <div class="side-photo" data-img-id="polaroid-side-2" onclick="openWidgetImgModal('polaroid-side-2', this)" style="background-image: url('https://i.postimg.cc/G2wz1xFw/image-download-1772630315877.jpg'); cursor: pointer;"></div>
              <div class="side-photo" data-img-id="polaroid-side-3" onclick="openWidgetImgModal('polaroid-side-3', this)" style="background-image: url('https://i.postimg.cc/26RTf7QD/image-download-1772630149759.jpg'); cursor: pointer;"></div>
            </div>
          </div>
        </div>
        <div class="app"><div class="app-icon" style="background:var(--icon-a)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg></div><span class="app-name">日历</span></div>
        <div class="app" onclick="if(window.openWorldBook)window.openWorldBook()"><div class="app-icon" style="background:var(--icon-b)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><span class="app-name">世界书</span></div>
        <div class="app" onclick="if(window.HSChat)window.HSChat.open()"><div class="app-icon" style="background:var(--icon-c)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><span class="app-name">Chat</span></div>
        <div class="app" onclick="if(window.HSApi)window.HSApi.open()"><div class="app-icon" style="background:var(--icon-d)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8"/></svg></div><span class="app-name">API</span></div>

        <!-- Row 3 & 4: 左侧4个App, 右侧音乐组件 -->
        <div class="app" style="transform: translateY(15px);" onclick="if(window.HSMemory)window.HSMemory.open()"><div class="app-icon" style="background:var(--icon-a)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><span class="app-name">记忆</span></div>
        <div class="app" style="transform: translateY(15px);" onclick="if(window.HSBackup)window.HSBackup.open()"><div class="app-icon" style="background:var(--icon-b)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h8M8 18h3"/></svg></div><span class="app-name">备份</span></div>
        
        <div class="music-wrapper">
          <!-- 侧边星星装饰与虚线 -->
          <svg class="m-star m-star-1" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <svg class="m-star m-star-2" viewBox="0 0 24 24"><path fill="url(#polka)" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <div class="m-dashed-line"></div>

          <!-- 盖被子主题卡片结构 -->
          <div class="music-inner">
            <div class="music-content-box">
              <!-- 气泡代替文字 -->
              <div class="m-bubble m-bubble-left" contenteditable="true" data-edit-id="bubble-left">Mạc Khiếu</div>
              <div class="m-bubble m-bubble-right" contenteditable="true" data-edit-id="bubble-right">Linh</div>
              
              <div class="m-avatar m-avatar-left" data-img-id="music-avatar-1" onclick="openWidgetImgModal('music-avatar-1', this)" style="background-image: url('https://i.postimg.cc/XJSx0kwH/image-download-1772630325431.jpg'); cursor: pointer;"></div>
              <div class="m-avatar m-avatar-right" data-img-id="music-avatar-2" onclick="openWidgetImgModal('music-avatar-2', this)" style="background-image: url('https://i.postimg.cc/G2wz1xFw/image-download-1772630315877.jpg'); cursor: pointer;"></div>
              <div class="m-quilt">
                <!-- 右下角星星线性底纹 -->
                <svg class="m-quilt-star" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.5">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <div class="app" style="transform: translateY(10px);"><div class="app-icon" style="background:var(--icon-c)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20"/></svg></div><span class="app-name">Safari</span></div>
        <div class="app" style="transform: translateY(10px);" onclick="openSettingsView()"><div class="app-icon" style="background:var(--icon-d)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div><span class="app-name">设置</span></div>

        <!-- 底部一排App已去掉 -->
      </div>
    </div>

    <!-- 第二页 -->
    <div class="page">
      <div style="padding: 10px 10px 20px;">
        <div style="font-size: 11px; font-weight: 600; letter-spacing: 1.2px; color: #aaa; text-transform: uppercase;">Wednesday · Insights</div>
        <div style="font-size: 24px; font-weight: 600; margin-margin-top: 4px; color: #333;">System status</div>
      </div>

      <div class="widget-long">
        <div style="display:flex; align-items:center; gap:12px;">
           <div style="width:36px; height:36px; background:rgba(0,0,0,0.05); border-radius:10px; display:flex; align-items:center; justify-content:center;">
             <svg style="width:18px; color:#888;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
           </div>
           <div>
             <p style="font-size:13px; font-weight:600; color:#333;" contenteditable="true" data-edit-id="music-title">Now Playing</p>
             <p style="font-size:11px; color:#888;" contenteditable="true" data-edit-id="music-sub">Slow Morning Breeze</p>
           </div>
        </div>
        <div style="font-size:11px; font-weight:600; color:#aaa;">02:44 / 04:12</div>
      </div>

      <div class="content-grid" style="grid-template-columns: repeat(4, 1fr);">
        <div class="app" onclick="openSettingsView()"><div class="app-icon" style="background:var(--icon-c)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></div><span class="app-name">Settings</span></div>
        <div class="app"><div class="app-icon" style="background:var(--icon-d)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><span class="app-name">Security</span></div>
        <div class="app"><div class="app-icon" style="background:var(--icon-a)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v11z"/></svg></div><span class="app-name">Files</span></div>
        <div class="app"><div class="app-icon" style="background:var(--icon-b)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div><span class="app-name">Work</span></div>
      </div>
    </div>
  </div>

  <div class="page-dots-container">
    <div class="page-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Dock 上方的渐变星星 -->
  <div class="floating-stars">
    <div class="f-star f-star-1"></div>
    <div class="f-star f-star-2"></div>
    <div class="f-star f-star-3"></div>
    <div class="f-star f-star-4"></div>
    <div class="f-star f-star-5"></div>
  </div>

  <!-- Dock (白色磨砂) -->
  <div class="dock">
    <div class="app"><div class="app-icon" style="background:var(--icon-c)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7 12.4 12.4 0 0 0 .6 2.6 2 2 0 0 1-.4 2.1L8 9.7a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4 12.4 12.4 0 0 0 2.6.6 2 2 0 0 1 1.7 2z"/></svg></div></div>
    <div class="app"><div class="app-icon" style="background:var(--icon-b)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M2 12h4M18 12h4M12 2v4M12 18v4"/><path d="M7.8 7.8l8.4 8.4"/></svg></div></div>
    <div class="app"><div class="app-icon" style="background:var(--icon-a)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div></div>
    <div class="app"><div class="app-icon" style="background:var(--icon-d)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div></div>
  </div>

  <div class="home-indicator"></div>

  <script src="js/00_utils.js"></script>
  <script src="js/01_settings.js"></script>
  <script src="js/02_db.js"></script>
  <script src="js/03_custom.js"></script>
  <script src="js/04_chat.js"></script>
  <script src="js/05_.api.js"></script>
  <script src="js/06_memory.js"></script>
  <script src="js/07_backup.js"></script>
  <script src="js/08_WorldBook.js"></script>
</body>
</html>
